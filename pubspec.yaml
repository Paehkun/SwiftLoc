name: swiftloc
description: "Real-time Location Tracking App with Circle System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.8
  
  # Location & Maps
  geolocator: ^13.0.1
  geolocator_android: ^4.6.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  google_maps_flutter: ^2.14.0
  flutter_animarker: ^3.2.0
  flutter_map_animations: ^0.8.0
  
  # Firebase & Backend
  firebase_core: ^3.0.0
  firebase_database: ^11.3.10
  firebase_auth: ^5.7.0
  firebase_storage: ^12.4.10
  
  # State Management & Services
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  shared_preferences: ^2.2.2
  battery_plus: ^7.0.0
  image_picker: ^1.2.1
  http: ^1.6.0
  permission_handler: ^12.0.1
  
  # Background & Notifications
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Plugin untuk buat Splash Screen (Buang skrin putih)
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

# --- CONFIGURATION SPLASH SCREEN ---
flutter_native_splash:
  color: "#ffffff" # Tukar ke kod warna tema kau (contoh: #0D1B2A)
  image: assets/images/splash.png # Pastikan kau dah letak logo.png dalam folder assets/images/
  android_12:
    image: assets/images/splash.png
    color: "#ffffff"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21 # saiz minimum android kau

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/ # Folder untuk logo/profile/marker
    # - assets/icons/ # Tambah kalau ada folder icon asing